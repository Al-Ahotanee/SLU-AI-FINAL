services:
  - type: web
    name: slu-faculty-repo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: AI_ENGINE_URL
        value: value: https://sgwazeer-sluengine.hf.space   # <-- update this
      - key: AI_SECRET
        value: slu-ai-bridge-secret                    # <-- use same value as HF Space secret
      - key: AI_TIMEOUT
        value: "15"
      - key: MAX_MB
        value: "50"
      - key: JWT_DAYS
        value: "7"
    disk:
      name: repo-storage
      mountPath: /data
      sizeGB: 1
